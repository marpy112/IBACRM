services:
  - type: web
    name: ibacrm
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 22.22.0
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: VITE_MAPBOX_TOKEN
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: VITE_API_BASE_URL
        value: /api
